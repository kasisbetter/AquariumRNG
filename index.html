<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Aquarium RNG - V1.0 Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;900&display=swap');

        :root {
            --rarity-common: #a8dadc;
            --rarity-uncommon: #52b788;
            --rarity-rare: #4ea8de;
            --rarity-epic: #9b5de5;
            --rarity-mythic: #ff9f1c;
            --rarity-omega: #e63946;
        }

        * { 
            box-sizing: border-box; 
            user-select: none; 
            font-family: 'Fredoka', sans-serif; 
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important; 
            outline: none;
            margin: 0; 
            padding: 0; 
        }

        body { 
            overflow: hidden; 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw; 
            touch-action: none;
        }

        #game-outer { 
            width: 100vw; 
            height: 100vh; 
            background: #fff; 
            position: relative; 
            overflow: hidden; 
        }

        /* --- STARTUP SEQUENCE --- */
        #loading-screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(135deg, #023e8a 0%, #00b4d8 100%); 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            overflow: hidden; 
            cursor: pointer; 
        }
        
        #loading-screen.dismiss { 
            opacity: 0; 
            transform: scale(1.15); 
            pointer-events: none; 
        }
        
        .load-bubble { 
            position: absolute; 
            bottom: -20px; 
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 50%; 
            animation: floatUp linear infinite; 
        }
        
        @keyframes floatUp { 
            0% { transform: translateY(0) scale(0.8); opacity: 0; } 
            20% { opacity: 1; } 
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } 
        }
        
        .loading-title-container { 
            animation: bob 3s ease-in-out infinite; 
            animation-delay: 1s; 
        }
        
        .loading-title { 
            font-size: 52px; 
            font-weight: 900; 
            color: white; 
            text-align: center; 
            line-height: 1; 
            margin-bottom: 20px; 
            text-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            z-index: 2; 
        }
        
        .title-word { 
            display: inline-block; 
            opacity: 0; 
            transform: translateY(30px) scale(0.9); 
            animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
        }
        
        .w1 { animation-delay: 0.2s; } 
        .w2 { animation-delay: 0.4s; font-size: 64px; color: #caf0f8; }
        
        @keyframes dropIn { 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .loading-status { 
            color: rgba(255,255,255,0.9); 
            font-weight: 700; 
            font-size: 14px; 
            margin-bottom: 12px; 
            z-index: 2; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: opacity 0.2s; 
            text-align: center;
        }
        
        .loading-bar-container { 
            width: 65%; 
            max-width: 400px; 
            height: 20px; 
            background: rgba(0,0,0,0.25); 
            border-radius: 12px; 
            border: 3px solid rgba(255,255,255,0.9); 
            overflow: hidden; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.2); 
            z-index: 2; 
            transition: opacity 0.4s; 
        }
        
        #loading-fill { 
            height: 100%; 
            width: 0%; 
            background: #fff; 
            border-radius: 4px; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            overflow: hidden; 
        }
        
        #loading-fill::after { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: -100%; 
            width: 50%; 
            height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); 
            animation: sweep 1s infinite linear; 
        }
        
        @keyframes sweep { to { left: 200%; } }
        
        .click-to-start-text { 
            display: inline-block; 
            animation: pulse 1.5s infinite; 
            font-size: 20px; 
            color: #ffca3a; 
        }
        
        @keyframes pulse { 
            0%, 100% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.05); opacity: 0.7; } 
        }
        
        @keyframes bob { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-10px); } 
        }
        
        .click-to-start { 
            position: absolute; 
            bottom: 20%; 
            color: white; 
            font-weight: 900; 
            font-size: 20px; 
            animation: pulse 1.5s infinite; 
            cursor: pointer; 
            display: none; 
            padding: 15px 30px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 20px; 
            z-index: 10; 
            border: 2px solid white;
        }

        /* --- HUD ELEMENTS --- */
        #save-indicator { 
            position: absolute; 
            top: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.5); 
            color: #fff; 
            padding: 6px 16px; 
            border-radius: 16px; 
            font-size: 13px; 
            font-weight: 700; 
            opacity: 0; 
            transition: opacity 0.3s; 
            z-index: 100; 
            pointer-events: none; 
            backdrop-filter: blur(4px); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        #hud-top { 
            position: absolute; 
            top: 35px; 
            width: 100%; 
            padding: 0 5%; 
            display: flex; 
            justify-content: space-between; 
            z-index: 20; 
            gap: 5px; 
        }
        
        .hud-pill { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(4px); 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: 700; 
            font-size: 16px; 
            color: #4a2f1d; 
            box-shadow: 0 6px 0px rgba(0,0,0,0.15); 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            transition: transform 0.1s; 
        }

        #toast-container { 
            position: absolute; 
            top: 85px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            z-index: 50; 
            pointer-events: none; 
        }
        
        .toast { 
            background: rgba(255,255,255,0.95); 
            padding: 8px 20px; 
            border-radius: 16px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            animation: slideDown 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), fadeOut 0.4s ease-in 1.5s forwards; 
            font-weight: 900; 
            font-size: 16px; 
            line-height: 1.1; 
        }
        
        .toast-odds { 
            font-size: 12px; 
            opacity: 0.7; 
            color: #4a2f1d; 
            margin-top: 2px; 
        }
        
        @keyframes slideDown { 
            from { transform: translateY(-20px) scale(0.9); opacity: 0; } 
            to { transform: translateY(0) scale(1); opacity: 1; } 
        }
        
        @keyframes fadeOut { 
            to { opacity: 0; transform: translateY(-10px); } 
        }

        #auto-controls { 
            position: absolute; 
            bottom: 165px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 10px; 
            z-index: 20; 
            display: none; 
        }
        
        #auto-controls button { 
            background: #fff; 
            border: 3px solid #e0d5c1; 
            border-radius: 14px; 
            padding: 6px 16px; 
            font-weight: 900; 
            color: #8b6b5d; 
            cursor: pointer; 
            box-shadow: 0 4px 0 #e0d5c1; 
            font-size: 11px; 
            text-transform: uppercase; 
            transition: all 0.1s; 
        }
        
        #auto-controls button.active { 
            background: #52b788; 
            color: white; 
            border-color: #40916c; 
            box-shadow: 0 4px 0 #40916c; 
        }
        
        #auto-controls button:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 0 transparent; 
        }

        #buff-timer { 
            position: absolute; 
            top: 120px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: linear-gradient(135deg, #ff9f1c 0%, #e63946 100%); 
            color: white; 
            padding: 4px 12px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 900; 
            opacity: 0; 
            transition: opacity 0.3s; 
            z-index: 40; 
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.4); 
            text-transform: uppercase; 
            pointer-events: none; 
            border: 2px solid white; 
            display: flex; 
            align-items: center; 
            gap: 4px;
        }
        
        #buff-timer.show { opacity: 1; }

        /* --- ENVIRONMENT --- */
        #room-bg { 
            position: absolute; top: 0; width: 100%; height: 72%; 
            background: repeating-linear-gradient(90deg, #fdf6ec, #fdf6ec 35px, #f5ead8 35px, #f5ead8 70px); 
        }
        
        #wainscoting { 
            position: absolute; bottom: 28%; width: 100%; height: 22%; 
            background: #e3d3b9; border-top: 6px solid #d4c2a5; 
            background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 45px); 
        }
        
        #window { 
            position: absolute; top: 18%; left: 10vw; width: 12vh; height: 16vh; min-width: 100px; min-height: 130px; 
            background: linear-gradient(180deg, #ff7eb3 0%, #ffb703 100%); 
            border: 8px solid #6f4228; border-radius: 8px; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.1), inset 0 0 20px rgba(255,255,255,0.4); 
            overflow: hidden; 
        }
        
        #window::before { content: ''; position: absolute; top: 0; left: 50%; width: 6px; height: 100%; background: #6f4228; transform: translateX(-50%); box-shadow: 2px 0 5px rgba(0,0,0,0.3); z-index: 2; }
        #window::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 6px; background: #6f4228; transform: translateY(-50%); box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 2; }
        
        #window-clouds { 
            position: absolute; top: 30%; left: -10px; width: 120%; height: 8px; background: rgba(255, 255, 255, 0.5); border-radius: 4px; 
            box-shadow: 15px 25px 0 4px rgba(255, 255, 255, 0.4), -5px 50px 0 2px rgba(255, 255, 255, 0.3); z-index: 1; animation: drift 20s linear infinite; 
        }
        
        @keyframes drift { 0% { transform: translateX(-10px); } 50% { transform: translateX(5px); } 100% { transform: translateX(-10px); } }
        
        #light-rays { 
            position: absolute; top: 18%; left: 10vw; width: 30vw; height: 50vh; 
            background: linear-gradient(135deg, rgba(255, 214, 112, 0.25) 0%, transparent 80%); 
            transform-origin: top left; transform: skewX(-15deg); z-index: 1; pointer-events: none; 
        }
        
        #shelf { position: absolute; top: 22%; right: 10vw; width: 15vw; max-width: 150px; min-width: 110px; height: 12px; background: #6f4228; border-radius: 6px; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .book { position: absolute; bottom: 12px; width: 16px; border-radius: 3px 3px 0 0; }
        .book-1 { left: 15px; height: 45px; background: #e63946; transform: rotate(-8deg); transform-origin: bottom left; }
        .book-2 { left: 35px; height: 50px; background: #457b9d; }
        .book-3 { left: 53px; height: 38px; background: #2a9d8f; }
        
        .potted-plant { position: absolute; bottom: 12px; right: 10px; width: 22px; height: 20px; background: #d4a373; border-radius: 4px 4px 10px 10px; }
        .potted-plant::before { content: ''; position: absolute; top: -18px; left: -6px; width: 16px; height: 16px; background: #52b788; border-radius: 50% 0 50% 0; transform: rotate(15deg); }
        .potted-plant::after { content: ''; position: absolute; top: -14px; left: 8px; width: 14px; height: 14px; background: #40916c; border-radius: 50% 0 50% 0; transform: rotate(80deg); }
        
        #picture-frame { 
            position: absolute; top: 15%; left: 35%; width: 8vh; height: 11vh; min-width: 70px; min-height: 90px; background: #fff; 
            border: 6px solid #4a2f1d; box-shadow: 0 10px 15px rgba(0,0,0,0.1), inset 0 0 8px rgba(0,0,0,0.1); transform: rotate(2deg); 
        }
        #picture-frame::after { content: ''; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px; background: linear-gradient(135deg, #ff9f1c 0%, #e63946 100%); border-radius: 30px 0 30px 0; }
        
        #lamp-glow { position: absolute; top: 90px; left: 45%; transform: translateX(-50%); width: 160px; height: 160px; background: radial-gradient(circle, rgba(255,200,0,0.4) 0%, rgba(255,200,0,0) 70%); border-radius: 50%; pointer-events: none; }
        #lamp { position: absolute; top: 80px; left: 45%; transform: translateX(-50%); width: 45px; height: 60px; background: #2b2b2b; border-radius: 0 0 25px 25px; box-shadow: inset 0 -5px 15px rgba(255,200,0,0.8); }
        #lamp::before { content: ''; position: absolute; top: -100px; left: 20px; width: 5px; height: 100px; background: #111; }
        
        #desk { position: absolute; bottom: 0; width: 100%; height: 28%; background: #4a2f1d; border-top: 14px solid #6f4228; box-shadow: inset 0 25px 35px rgba(0,0,0,0.5); }
        #desk-mat { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60vw; max-width: 600px; height: 8vh; min-height: 60px; background: #3d2516; border-radius: 0 0 15px 15px; }
        
        #mug { 
            position: absolute; bottom: 28%; left: 12vw; width: 24px; height: 28px; background: #f28482; border-radius: 3px 3px 8px 8px; 
            z-index: 15; box-shadow: -5px 10px 15px rgba(0,0,0,0.4), inset -3px 0 5px rgba(0,0,0,0.2); 
        }
        #mug::before { content:''; position: absolute; top: 5px; right: -8px; width: 12px; height: 16px; border: 4px solid #f28482; border-left: none; border-radius: 0 8px 8px 0; }
        .steam { position: absolute; top: -15px; left: 6px; width: 4px; height: 15px; background: rgba(255,255,255,0.4); border-radius: 2px; filter: blur(1px); animation: rise 3s infinite ease-in; }
        .steam.s2 { left: 14px; height: 10px; animation-duration: 2.5s; animation-delay: 0.5s; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-20px) scale(2); opacity: 0; } }
        
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(139, 107, 93, 0.3) 100%); pointer-events: none; z-index: 18; mix-blend-mode: multiply; }

        /* --- AQUARIUM --- */
        #aquarium-wrapper { 
            position: absolute; bottom: 28%; left: 50%; transform: translateX(-50%); width: 35vh; height: 32vh; min-width: 260px; min-height: 240px; z-index: 10; cursor: pointer; 
        }
        #bowl-shadow { position: absolute; bottom: -20px; left: 10%; width: 80%; height: 40px; background: rgba(0,0,0,0.6); border-radius: 50%; filter: blur(8px); z-index: 0; }
        #bowl-glass { 
            width: 100%; height: 100%; border-radius: 45% 45% 48% 48%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 60%), rgba(180, 230, 255, 0.15); 
            box-shadow: inset 15px -20px 40px rgba(0,0,0,0.3), inset -15px 0 40px rgba(255,255,255,0.8), inset 0 -8px 20px rgba(0, 150, 200, 0.4), 0 15px 25px rgba(0,0,0,0.2); 
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.5); border-top: none; z-index: 2; pointer-events: none;
        }
        #bowl-rim { position: absolute; top: -8px; left: 15%; width: 70%; height: 24px; border: 4px solid rgba(255,255,255,0.9); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.15), inset 0 3px 8px rgba(255,255,255,0.9), inset 0 -2px 5px rgba(0,0,0,0.1); z-index: 15; background: rgba(255,255,255,0.1); pointer-events: none;}
        #bowl-glare { position: absolute; top: 15%; left: 4%; width: 35%; height: 70%; border-radius: 50%; background: linear-gradient(90deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%); transform: rotate(-15deg); pointer-events: none; z-index: 10; filter: blur(1px); }
        #water { position: absolute; bottom: 0; width: 100%; height: 75%; background: radial-gradient(circle at 50% 120%, rgba(0, 119, 182, 0.85) 0%, rgba(0, 180, 216, 0.4) 100%); overflow: hidden; pointer-events: none;}
        #water-wave { position: absolute; top: -10px; left: -50%; width: 200%; height: 20px; background: rgba(255,255,255,0.15); border-radius: 40%; animation: wave-motion 6s infinite linear; }
        @keyframes wave-motion { 0% { transform: translateX(0) rotate(0); } 100% { transform: translateX(50px) rotate(360deg); } }
        
        .decor-sand { position: absolute; bottom: -10px; width: 100%; height: 40px; background: #d4a373; border-radius: 50% 50% 0 0; box-shadow: inset 0 10px 10px rgba(0,0,0,0.2); }
        .decor-plant { position: absolute; bottom: 15px; left: 50px; width: 14px; height: 50px; background: #2d6a4f; border-radius: 10px 10px 0 0; transform-origin: bottom center; animation: sway 3s infinite alternate ease-in-out; box-shadow: inset -3px 0 5px rgba(0,0,0,0.3); }
        .decor-plant.right { left: auto; right: 50px; height: 70px; background: #40916c; animation-delay: 0.5s; }
        @keyframes sway { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }
        #aquarium-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        #feed-hint { 
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%); 
            background: #ff9f1c; color: white; padding: 6px 14px; border-radius: 14px; 
            font-weight: 900; font-size: 14px; opacity: 0; transition: opacity 0.3s; 
            box-shadow: 0 6px 15px rgba(255, 159, 28, 0.4); pointer-events: none; 
            white-space: nowrap; animation: bob 2s infinite; z-index: 20; 
            border: 2px solid white; display: flex; align-items: center; gap: 4px;
        }
        #feed-hint.show { opacity: 1; }

        /* --- PERFECTLY SCALED RESPONSIVE UI --- */
        #bottom-ui { 
            position: absolute; 
            bottom: 2vh; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            gap: 1.5vw; 
            padding: 0 2vw; 
            z-index: 20; 
        }
        
        .roblox-btn { 
            background: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 6px 0px rgba(0,0,0,0.15); 
            cursor: pointer; 
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s; 
            font-weight: 700; 
            color: #6f4228; 
            text-transform: uppercase; 
            border-radius: 20px;
        }
        .roblox-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.15); }

        /* Outer Buttons (Smallest) */
        .roblox-btn-outer { 
            width: 14vw; 
            max-width: 65px; 
            height: 14vw; 
            max-height: 60px; 
            font-size: clamp(7px, 2.2vw, 9px); 
            border-radius: 12px;
        }
        .roblox-btn-outer .btn-icon { font-size: clamp(16px, 4vw, 22px); margin-bottom: 2px; }

        /* Inner Buttons (Medium) */
        .roblox-btn-inner { 
            width: 17vw; 
            max-width: 80px; 
            height: 17vw; 
            max-height: 75px; 
            font-size: clamp(8px, 2.5vw, 11px); 
            border-radius: 16px; 
        }
        .roblox-btn-inner .btn-icon { font-size: clamp(20px, 5vw, 28px); margin-bottom: 2px; }
        
        /* The Roll Button (Massive Soft Squircle) */
        .roblox-btn-center { 
            width: 25vw; 
            max-width: 130px; 
            height: 20vw; 
            max-height: 100px; 
            font-size: clamp(14px, 4vw, 24px); 
            background: linear-gradient(180deg, #ffca3a 0%, #ffb703 100%); 
            color: #7f5500; 
            box-shadow: 0 10px 0px #b57a00; 
            border-radius: clamp(16px, 5vw, 28px); 
            border: clamp(2px, 0.6vw, 4px) solid #fff; 
            z-index: 25;
        }
        .roblox-btn-center:active { transform: translateY(8px); box-shadow: 0 2px 0px #b57a00; }
        .roblox-btn-center .btn-icon { font-size: clamp(28px, 7.5vw, 46px); margin-bottom: 2px; filter: drop-shadow(0 4px 0 rgba(0,0,0,0.15)); }

        /* --- MODALS & MENUS --- */
        .modal-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(8px); 
            z-index: 100; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-card { 
            background: #fff8f0; 
            width: 95vw; 
            height: 90vh; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            padding: 20px; 
            transform: translateY(40px) scale(0.9); 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        .modal-overlay.active .modal-card { transform: translateY(0) scale(1); }
        
        #modal-inventory .modal-card, #modal-skills .modal-card { max-width: 800px; height: 80vh; width: 85vw; }
        #modal-rebirth .modal-card, #modal-settings .modal-card { max-width: 450px; height: auto; max-height: 80vh; width: 90vw; }

        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            z-index: 10; 
            position: relative; 
            width: 100%;
        }
        .modal-title { font-size: 26px; font-weight: 700; color: #4a2f1d; margin: 0; display: flex; align-items: center; gap: 8px;}
        
        .close-circle, .back-btn { 
            width: 42px; 
            height: 42px; 
            min-width: 42px;

<script>
    const $ = id => document.getElementById(id);
    const AudioEngine = {
        ctx: null, started: false,
        init() { if(this.started) return; this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.started = true; this.startMusic(); },
        playTone(type, f1, f2, t, dur, vol, attack=0.01) {
            let safeT = Math.max(t, this.ctx.currentTime + 0.01), o = this.ctx.createOscillator(), g = this.ctx.createGain();
            o.type = type; o.frequency.setValueAtTime(f1, safeT); if(f2) o.frequency.exponentialRampToValueAtTime(f2, safeT+dur*0.5);
            g.gain.setValueAtTime(0, safeT); g.gain.linearRampToValueAtTime(vol, safeT+attack); g.gain.exponentialRampToValueAtTime(0.001, safeT+dur);
            o.connect(g); g.connect(this.ctx.destination); o.start(safeT); o.stop(safeT+dur+0.1); return {o, g};
        },
        startMusic() {
            let bLen = 60/75, nTime = this.ctx.currentTime + 0.1, bStep = 0, cIdx = 0;
            const chords = [ {r:146.83, n:[293.66, 349.23, 440.00, 523.25]}, {r:98.00, n:[349.23, 392.00, 493.88, 587.33]}, {r:130.81, n:[329.63, 392.00, 493.88, 587.33]}, {r:110.00, n:[311.13, 392.00, 440.00, 554.37]} ];
            const playCh = (c, t, d, v) => c.forEach((f,i) => this.playTone('sine', f, null, t+(i*0.04), d, v, 0.05));
            const playBa = (f, t, d) => { let {o,g} = this.playTone('triangle', f, null, t, d, 0.4, 0.1); let fl = this.ctx.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=300; o.disconnect(); o.connect(fl); fl.connect(g); };
            const sched = () => {
                if (nTime < this.ctx.currentTime) nTime = this.ctx.currentTime + 0.1;
                while (nTime < this.ctx.currentTime + 0.5) {
                    if (bStep%8===0) { playBa(chords[cIdx].r, nTime, bLen*4.5); playCh(chords[cIdx].n, nTime, bLen*6, 0.15); }
                    if (bStep%8===3) playCh(chords[cIdx].n, nTime+(bLen/2), bLen*2.5, 0.05);
                    if (bStep%8===7) cIdx = (cIdx+1)%chords.length;
                    nTime += bLen/2; bStep++;
                } setTimeout(sched, 100);
            }; sched();
        },
        playSFX(type, tier) {
            if(!this.started) return; let t = this.ctx.currentTime;
            if(type === 'click') this.playTone('sine', 600, 800, t, 0.1, 0.15);
            else if(type === 'buy') this.playTone('triangle', 880, 1108.73, t, 0.4, 0.1);
            else if(type === 'error') this.playTone('triangle', 150, 100, t, 0.2, 0.15);
            else if(type === 'feed' || type === 'roll') this.playTone('sine', 300, type==='feed'?500:150, t, 0.1, 0.15);
            else if(type === 'rebirth') [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50].forEach((f,i) => this.playTone('triangle', f, null, t+(i*0.1), 1.0, 0.2, 0.05));
            else if(type === 'reveal') {
                let fq = [261.63, 329.63, 392.00];
                if(tier==='Rare') fq.push(523.25); if(tier==='Epic') fq=[261.63,311.13,392.00,466.16]; if(tier==='Mythic') fq=[261.63,329.63,415.30,523.25,659.25]; if(tier==='Omega') fq=[261.63,311.13,392.00,466.16,587.33,698.46,932.33];
                fq.forEach((f,i) => this.playTone('sine', f, null, t+(i*0.08), 0.4, 0.15));
            }
        }
    };
    window.startAudioEngine = () => AudioEngine.init();

    window.addEventListener('load', () => {
        window.loadGame(); window.initTreeCamera();
        setTimeout(() => { $('loading-fill').style.width = '35%'; $('loading-text').innerText = "Warming Water..."; }, 400);
        setTimeout(() => { $('loading-fill').style.width = '75%'; $('loading-text').innerText = "Feeding Fish..."; }, 1200);
        setTimeout(() => { 
            $('loading-fill').style.width = '100%'; $('loading-text').innerHTML = "<span class='click-to-start-text'>TAP ANYWHERE TO START</span>";
            $('loading-screen').addEventListener('click', function() { AudioEngine.init(); this.classList.add('dismiss'); setTimeout(() => this.style.display = 'none', 600); }, { once: true });
        }, 2000);
    });

    const toRoman = num => { if(num<1)return""; const l={M:1000,CM:900,D:500,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1}; let r=''; for(let i in l){while(num>=l[i]){r+=i;num-=l[i];}} return r; };

    let isWiping = false, currentSkillView = 'root', lastRollTime = 0, lastAutoRollTime = 0, lastAnimTime = 0, incomeAccumulator = 0, revealingFish = null;
    let gameState = { inventory: [], luckMultiplier: 1.0, activeFish: [], money: 0, maxCapacity: 5, autoRollEnabled: false, hideRollsEnabled: false, equippedItem: null, consumables: { flakes: 0, goldenFlakes: 0, diamondFlakes: 0, bait: 0 }, activeBuff: { type: null, timer: 0, multiplier: 1 }, rebirths: 0, rebirthMultiplier: 1.0, skills: { tankLevel: 0, tankCost: 250, fishFlakes: false, unlockedGolden: false, unlockedDiamond: false, playerLuckLevel: 0, playerLuckCost: 100, cosmicLuckLevel: 0, cosmicLuckCost: 50000, quickRollLevel: 0, quickRollCost: 5000, autoRollLevel: 0, autoRollCost: 500, hideRolls: false, cosmicRollUnlocked: false, cosmicRollCost: 250000, unlockedBait: false, baitLevel: 0, baitUpgradeCost: 2500 }, particles: [], floatingTexts: [], foodParticles: [] };

    const fishMatrix = [{name:"Guppy",tier:"Common",weight:650,color:"#4ea8de",size:14,income:1}, {name:"Tetra",tier:"Common",weight:500,color:"#ff70a6",size:16,income:1}, {name:"Molly",tier:"Uncommon",weight:250,color:"#52b788",size:14,income:2}, {name:"Angelfish",tier:"Rare",weight:90,color:"#ffca3a",size:20,income:5}, {name:"Betta",tier:"Epic",weight:30,color:"#9b5de5",size:22,income:15}, {name:"Discus",tier:"Mythic",weight:5,color:"#ff595e",size:26,income:50}, {name:"Arowana",tier:"Omega",weight:0.5,color:"#111111",size:32,income:200}];
    const tierStyles = { "Common": {color:"#a8dadc", p:15}, "Uncommon": {color:"#52b788", p:25}, "Rare": {color:"#4ea8de", p:40}, "Epic": {color:"#9b5de5", p:60}, "Mythic": {color:"#ff9f1c", p:100}, "Omega": {color:"#e63946", p:180} };

    window.loadGame = function() {
        const s = localStorage.getItem('aquariumRNG_save');
        if (s) { try { const p=JSON.parse(s); gameState={...gameState,...p,skills:{...gameState.skills,...p.skills},consumables:{...gameState.consumables,...p.consumables}}; if(p.skills) { if(p.skills.autoRoll3) gameState.skills.autoRollLevel=3; else if(p.skills.autoRoll2) gameState.skills.autoRollLevel=2; else if(p.skills.autoRoll1) gameState.skills.autoRollLevel=1; } if(p.activeFish) gameState.activeFish=p.activeFish.map(f=>new FishEntity(f)); } catch(e){} }
        if(gameState.autoRollEnabled) { $('btn-auto').classList.add('active'); $('btn-auto').innerText='Auto: ON'; }
        if(gameState.hideRollsEnabled) { $('btn-hide').classList.add('active'); $('btn-hide').innerText='Hide: ON'; }
        window.updateFeedHint(); window.updateHUD(); window.buildInventoryGrid();
    }
    window.saveGame = function() { if (isWiping) return; const sObj={...gameState, activeFish:gameState.activeFish.map(f=>({name:f.name,tier:f.tier,weight:f.weight,color:f.color,size:f.size,income:f.income})), particles:[], floatingTexts:[], foodParticles:[]}; localStorage.setItem('aquariumRNG_save', JSON.stringify(sObj)); $('save-indicator').style.opacity='1'; setTimeout(()=>$('save-indicator').style.opacity='0',1500); }
    window.wipeSave = function(e) { e.stopPropagation(); AudioEngine.playSFX('click'); if(confirm("Wipe all progress?")){ isWiping=true; localStorage.removeItem('aquariumRNG_save'); location.reload(); } }
    setInterval(window.saveGame, 300000); document.addEventListener('visibilitychange', () => { if (document.visibilityState==='hidden') window.saveGame(); }); window.addEventListener('pagehide', window.saveGame);

    const cvs = $('aquarium-canvas'); const ctx = cvs.getContext('2d');
    function rs() { const r=cvs.parentElement.getBoundingClientRect(); cvs.width=r.width; cvs.height=r.height; } window.addEventListener('resize', rs); rs();

    class FishEntity {
        constructor(c) { Object.assign(this,c); this.seed=Math.random()*1000; this.x=cvs.width/2; this.y=cvs.height*0.6; this.vx=(Math.random()-0.5)*1.5; this.vy=(Math.random()-0.5)*0.6; this.tX=this.x; this.tY=this.y; this.timer=0; this.flip=this.vx>0?1:-1; }
        update() {
            if(--this.timer<=0) { 
                this.tX=Math.random()*(cvs.width-60)+30; 
                this.tY=(gameState.activeBuff.timer>0&&gameState.activeBuff.type==='bait')?Math.random()*(cvs.height*0.2)+20:Math.random()*(cvs.height*0.4)+(cvs.height*0.4); 
                this.timer=Math.random()*150+50; this.vx+=(this.tX-this.x)*0.005; 
            }
            this.vx+=(this.tX-this.x)*0.0005; this.vy+=(this.tY-this.y)*0.0005; this.vx*=0.98; this.vy*=0.98;
            const lim=this.tier==="Omega"?0.8:1.6; this.vx=Math.max(-lim,Math.min(lim,this.vx)); this.vy=Math.max(-0.4,Math.min(0.4,this.vy));
            this.x+=this.vx; this.y+=this.vy; if(this.vx>0.1)this.flip=1; if(this.vx<-0.1)this.flip=-1;
        }
        draw(rCtx=ctx) {

    function stepAnimationLoop(ts) {
        if(!lastAnimTime)lastAnimTime=ts; const dt=ts-lastAnimTime; lastAnimTime=ts; ctx.clearRect(0,0,cvs.width,cvs.height); window.addAmbientBubble();
        gameState.activeFish.forEach(f=>{f.update();f.draw();});
        
        // Cleaned up solid drawing for the ambient bubbles
        for(let i=gameState.particles.length-1;i>=0;i--){let p=gameState.particles[i];p.x+=p.vx;p.y+=p.vy;p.alpha-=p.decay;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,p.alpha);ctx.fill();ctx.globalAlpha=1.0;if(p.alpha<=0)gameState.particles.splice(i,1);} if(gameState.particles.length>300)gameState.particles.splice(0,gameState.particles.length-300);
        
        for(let i=gameState.foodParticles.length-1;i>=0;i--){let f=gameState.foodParticles[i];f.x+=f.vx;f.y+=f.vy;ctx.beginPath();ctx.arc(f.x,f.y,f.size,0,Math.PI*2);ctx.fillStyle=f.color;ctx.fill();if(f.y>cvs.height)gameState.foodParticles.splice(i,1);}
        for(let i=gameState.floatingTexts.length-1;i>=0;i--){let t=gameState.floatingTexts[i];t.y-=t.vy;t.alpha-=0.02;ctx.fillStyle=`rgba(255,255,255,${Math.max(0,t.alpha)})`;ctx.font="bold 16px Fredoka";ctx.textAlign="center";ctx.fillText("+"+t.amount,t.x,t.y);if(t.alpha<=0)gameState.floatingTexts.splice(i,1);} if(gameState.floatingTexts.length>50)gameState.floatingTexts.splice(0,gameState.floatingTexts.length-50);
        if($('roll-overlay').classList.contains('active')&&revealingFish){let r=$('reveal-canvas').getContext('2d'); r.clearRect(0,0,200,200); revealingFish.draw(r);}
        
        let now=Date.now(), cd=Math.max(500,3000-(gameState.skills.quickRollLevel*500)), b=$('btn-roll');
        if(now-lastRollTime<cd) { b.style.filter='grayscale(100%) opacity(0.6)'; b.style.pointerEvents='none'; b.innerHTML=`<span class="btn-icon">⏳</span> ${((cd-(now-lastRollTime))/1000).toFixed(1)}s`; }
        else { b.style.filter='none'; b.style.pointerEvents='auto'; b.innerHTML=`<span class="btn-icon">🎲</span> Roll`; }

        if(gameState.autoRollEnabled) { let iv=gameState.skills.cosmicRollUnlocked?250:gameState.skills.autoRollLevel>=5?500:gameState.skills.autoRollLevel===4?1000:gameState.skills.autoRollLevel===3?1500:gameState.skills.autoRollLevel===2?3500:8000; if(ts-lastAutoRollTime>iv) { lastAutoRollTime=ts; lastRollTime=Date.now(); window.triggerRoll(false); } }
        let bt=$('buff-timer'); if(gameState.activeBuff.timer>0) { gameState.activeBuff.timer-=dt; bt.innerHTML=`SPEED x${gameState.activeBuff.multiplier} (${Math.ceil(gameState.activeBuff.timer/1000)}s)`; bt.classList.add('show'); if(gameState.activeBuff.timer<=0){gameState.activeBuff.timer=0;gameState.activeBuff.multiplier=1;bt.classList.remove('show');} } else bt.classList.remove('show');
        incomeAccumulator+=dt*(gameState.activeBuff.timer>0?gameState.activeBuff.multiplier:1); if(incomeAccumulator>=2000){incomeAccumulator-=2000;window.triggerIncome();}
        requestAnimationFrame(stepAnimationLoop);
    } requestAnimationFrame(stepAnimationLoop);

    window.triggerRoll = m => {
        if($('roll-overlay').classList.contains('active')&&(!gameState.hideRollsEnabled||!gameState.skills.hideRolls))return;
        let n=Date.now(), cd=Math.max(500,3000-(gameState.skills.quickRollLevel*500)); if(m){if(n-lastRollTime<cd){AudioEngine.playSFX('error');return;}lastRollTime=n;}
        AudioEngine.playSFX('roll'); let pl=[], tw=0; fishMatrix.forEach(f=>{let w=f.weight*(f.tier!=="Common"?gameState.luckMultiplier:1); pl.push({f,w}); tw+=w;});
        let tv=Math.random()*tw, sel=pl[0].f; for(let e of pl){if(tv<e.w){sel=e.f;break;}tv-=e.w;}
        if(gameState.skills.hideRolls&&gameState.hideRollsEnabled) window.executeHiddenRoll(sel); else window.executeCinematicSequence(sel);
    }
    window.processFishGain = f => {
        gameState.inventory.push(f);
        if(gameState.activeFish.length<gameState.maxCapacity) {
            gameState.activeFish.push(new FishEntity(f));
        } else {
            let wi=-1, hw=-1;
            gameState.activeFish.forEach((a,i)=>{if(a.weight>hw){hw=a.weight;wi=i;}});
            if(f.weight<hw) { gameState.activeFish.splice(wi,1); gameState.activeFish.push(new FishEntity(f)); }
        }
        window.updateHUD(); window.buildInventoryGrid();
    }

    window.executeHiddenRoll = f => {
        window.spawnExplosion(cvs.width/2,cvs.height*0.5,f.color,tierStyles[f.tier].p/2);
        window.processFishGain(f);
        AudioEngine.playSFX('reveal',f.tier);
        const c=$('toast-container'), t=document.createElement('div');
        t.className='toast'; t.style.borderBottom=`3px solid ${tierStyles[f.tier].color}`;
        const odds = Math.round(fishMatrix.reduce((s,x)=>s+x.weight,0)/f.weight).toLocaleString();
        t.innerHTML=`<span style="color:${tierStyles[f.tier].color}">${f.name}</span><span class="toast-odds">1 / ${odds}</span>`;
        c.appendChild(t); setTimeout(()=>t.remove(),2000);
    }

    window.executeCinematicSequence = f => {
        const o=$('roll-overlay'); $('reveal-title').innerText=f.name;
        $('reveal-odds').innerText='1 / '+Math.round(fishMatrix.reduce((s,x)=>s+x.weight,0)/f.weight).toLocaleString();
        $('reveal-tier').innerText=f.tier; $('reveal-tier').style.backgroundColor=tierStyles[f.tier].color;
        revealingFish=new FishEntity(f); revealingFish.x=100; revealingFish.y=100; revealingFish.size=f.size*2.5; revealingFish.flip=1; revealingFish.vx=0; revealingFish.vy=0;
        o.classList.add('active'); AudioEngine.playSFX('reveal',f.tier);
        setTimeout(()=>{window.spawnExplosion(cvs.width/2,cvs.height*0.5,f.color,tierStyles[f.tier].p); window.processFishGain(f); o.classList.remove('active');},1800);
    }

    window.buildInventoryGrid = () => {
        let h='';
        const rc=(t,ic,n,c,ac)=>{
            if(gameState.consumables[t]>0){
                let a=gameState.equippedItem===t;
                h+=`<div class="grid-slot" onclick="window.toggleEquipItem('${t}')" style="border-color:${c};background:${a?ac:'#fff'};"><div style="font-size:38px;margin-bottom:4px;filter:drop-shadow(0 4px 2px rgba(0,0,0,0.15));line-height:1;">${ic}</div><div style="font-size:11px;font-weight:700;color:${c}">Item</div><div style="font-size:13px;color:#1d3557;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;">${n}</div><div class="count-badge" style="background:${a?'#40916c':'#6f4228'}">${a?'UNEQUIP':'EQUIP'} (x${gameState.consumables[t]})</div></div>`;
            }
        };

        rc('flakes','🥫','Fish Flakes','#ff9f1c','#e2f0cb');
        rc('goldenFlakes','✨','Golden Flakes','#ffca3a','#fff8cc');
        rc('diamondFlakes','💎','Diamond Flakes','#4ea8de','#cceeff');
        rc('bait','🎣','Bait','#f28482','#fcebe9');

        if(!gameState.inventory.length&&!gameState.consumables.flakes&&!gameState.consumables.goldenFlakes&&!gameState.consumables.diamondFlakes&&!gameState.consumables.bait){
            $('inventory-target').innerHTML=`<div style="grid-column:span 3;text-align:center;color:#94a3b8;padding:20px;">Empty Backpack</div>`;return;
        }
        
        let gi={};
        gameState.inventory.forEach(i=>{if(!gi[i.name]){gi[i.name]={...i,count:1};}else gi[i.name].count++;});
        const iC=document.createElement('canvas'); iC.width=80; iC.height=80; const iX=iC.getContext('2d');

        Object.values(gi).forEach(i=>{
            iX.clearRect(0,0,80,80); let d=new FishEntity(i); d.x=40; d.y=40; d.size=i.size*0.9; d.flip=1; d.vx=0; d.vy=0; d.draw(iX);
            let imgData = iC.toDataURL();
            h+=`<div class="grid-slot" style="border-color:${tierStyles[i.tier].color}"><img src="${imgData}" class="fish-snapshot"><div style="font-size:11px;font-weight:700;color:${tierStyles[i.tier].color}">${i.tier}</div><div style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;color:#1d3557;">${i.name}</div><div class="count-badge">x${i.count}</div></div>`;
        });
        $('inventory-target').innerHTML=h;
    }

    window.openModal = id => {
        AudioEngine.playSFX('click');
        if (id==='modal-skills') { if(!$('modal-skills').classList.contains('active'))window.resetTreeCamera(); window.renderSkillTree(); }
        if (id==='modal-rebirth') window.renderRebirthMenu();
        $(id).classList.add('active');
    }
    
    window.closeModal = e => { if(e.target.classList.contains('modal-overlay')) window.forceClose(); }
    window.forceClose = () => { AudioEngine.playSFX('click'); document.querySelectorAll('.modal-overlay').forEach(el=>el.classList.remove('active')); }
</script>

</body>
</html>
